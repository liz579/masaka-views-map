<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plat Map</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title"><strong>Masaka Views Estate</strong><br><span class="subtitle">by <a href="https://fortisgreenhousing.com/masaka-views" target="_blank">Fortis Green Housing</a></span></h1>
            <div class="category-menu" id="categoryMenu">
                <button class="category-btn active" data-category="all">All Units</button>
                <button class="category-btn" data-category="2br-townhouses">2-Bedroom Townhouses</button>
                <button class="category-btn" data-category="3br-townhouses">3-Bedroom Townhouses</button>
                <button class="category-btn" data-category="3br-single-family">3-Bedroom Single-Family Houses</button>
                <button class="category-btn" data-category="4br-single-family">4-Bedroom Single-Family Houses</button>
            </div>
            <div class="loading-indicator" id="loadingIndicator">
                <span>Loading map data...</span>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Map Container -->
            <div class="map-container">
                <div class="zoom-control zoom-control-desktop">
                    <label for="zoomSliderDesktop">Zoom</label>
                    <input type="range" id="zoomSliderDesktop" min="1" max="4" step="0.1" value="1">
                </div>
                <div class="map-compass" aria-label="Compass">
                    <span class="map-compass-needle" aria-hidden="true"></span>
                </div>
                <div id="mapWrapper" class="map-wrapper">
                    <!-- SVG will load here -->
                </div>
                <div class="zoom-control zoom-control-mobile">
                    <label for="zoomSliderMobile">Zoom</label>
                    <input type="range" id="zoomSliderMobile" min="1" max="4" step="0.1" value="1">
                </div>
                <div class="map-legend">
                    <button class="legend-item legend-button" data-status="available" type="button">
                        <div class="legend-color available"></div>
                        <span>Available <span class="legend-count">(0)</span></span>
                    </button>
                    <button class="legend-item legend-button" data-status="reserved" type="button">
                        <div class="legend-color reserved"></div>
                        <span>Reserved <span class="legend-count">(0)</span></span>
                    </button>
                    <button class="legend-item legend-button" data-status="prebooked" type="button">
                        <div class="legend-color prebooked"></div>
                        <span>Pre-Booked <span class="legend-count">(0)</span></span>
                    </button>
                    <button class="legend-item legend-button" data-status="sold" type="button">
                        <div class="legend-color sold"></div>
                        <span>Sold <span class="legend-count">(0)</span></span>
                    </button>
                    <button class="legend-item legend-button" data-status="unreleased" type="button">
                        <div class="legend-color unreleased"></div>
                        <span>Unreleased <span class="legend-count">(0)</span></span>
                    </button>
                    <div class="legend-item legend-construction-item">
                        <span class="legend-construction-dot under-construction" aria-hidden="true"></span>
                        <span>Under Construction</span>
                    </div>
                    <div class="legend-item legend-construction-item">
                        <span class="legend-construction-dot completed" aria-hidden="true"></span>
                        <span>Completed</span>
                    </div>
                </div>
            </div>

            <!-- Details Sidebar -->
            <div class="details-panel">
                <div id="detailsContent" class="details-content">
                    <p class="no-selection">👈 Click a lot to view details</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
